apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sigmalang.fullname" . }}-config
  namespace: {{ include "sigmalang.namespace" . }}
  labels:
    {{- include "sigmalang.labels" . | nindent 4 }}
data:
  SIGMALANG_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  SIGMALANG_LOG_FORMAT: {{ .Values.config.logFormat | quote }}
  SIGMALANG_WORKERS: {{ .Values.config.workers | quote }}
  COMPRESSION_WORKERS: {{ .Values.config.compressionWorkers | quote }}
  SIGMALANG_METRICS_ENABLED: {{ .Values.config.metricsEnabled | quote }}
  SIGMALANG_CACHE_ENABLED: {{ .Values.config.cacheEnabled | quote }}
  SIGMALANG_CACHE_TTL: {{ .Values.config.cacheTTL | quote }}
  {{- if .Values.redis.enabled }}
  REDIS_HOST: {{ include "sigmalang.redis.host" . | quote }}
  REDIS_PORT: {{ include "sigmalang.redis.port" . | quote }}
  {{- end }}
