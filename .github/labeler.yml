documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "docs/**"
          - "**/*.md"
          - "mkdocs.yml"

tests:
  - changed-files:
      - any-glob-to-any-file:
          - "tests/**"
          - "**/test_*.py"
          - "**/*_test.py"
          - "conftest.py"

ci:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - ".pre-commit-config.yaml"
          - "Makefile"

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - "pyproject.toml"
          - "requirements*.txt"
          - "poetry.lock"
          - "uv.lock"

docker:
  - changed-files:
      - any-glob-to-any-file:
          - "Dockerfile*"
          - "docker-compose*.yml"
          - ".dockerignore"

infrastructure:
  - changed-files:
      - any-glob-to-any-file:
          - "infrastructure/**"
          - "k8s/**"
          - "helm/**"
          - "prometheus/**"
          - "grafana/**"

core:
  - changed-files:
      - any-glob-to-any-file:
          - "sigmalang/core/**"

training:
  - changed-files:
      - any-glob-to-any-file:
          - "sigmalang/training/**"

integrations:
  - changed-files:
      - any-glob-to-any-file:
          - "integrations/**"
          - "api_gateways/**"

security:
  - changed-files:
      - any-glob-to-any-file:
          - "security_fixes/**"
          - "SECURITY*.md"

performance:
  - changed-files:
      - any-glob-to-any-file:
          - "benchmark_*.py"
          - "performance_*/**"
          - "performance_fixes/**"
