name: Stale Issues and PRs

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark stale
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,security,roadmap,help-wanted"
          exempt-pr-labels: "pinned,security,blocked"
          stale-issue-message: >
            This issue has been automatically marked as stale due to 60 days
            of inactivity. It will be closed in 14 days if no further activity
            occurs. Add a comment or remove the `stale` label to keep it open.
          stale-pr-message: >
            This pull request has been automatically marked as stale due to 30
            days of inactivity. It will be closed in 14 days if no further
            activity occurs. Add a comment or remove the `stale` label to keep
            it open.
          close-issue-message: >
            Closing due to inactivity. Reopen if this is still relevant.
          close-pr-message: >
            Closing due to inactivity. Reopen if you intend to continue.
          operations-per-run: 100
