name: Claude Code Security Review

on:
  pull_request:
    paths:
      - 'core/**/*.py'
  push:
    branches: [main, develop]
    paths:
      - 'core/crypto_*.py'
      - 'core/key_*.py'

jobs:
  security-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Claude Security Review
        run: |
          echo "🔒 Security review would run here"
          echo "Files: core/crypto_primitives.py, core/key_derivation.py"

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.md
