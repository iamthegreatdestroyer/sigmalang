# =============================================================================
# Changelog — Autonomy & Automation v10 (Tier E3)
# Auto-generates CHANGELOG.md from conventional commits on tag push
# =============================================================================
name: Changelog

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to generate changelog for (e.g. v2.0.0)'
        required: true

permissions:
  contents: write

concurrency:
  group: changelog-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    name: Generate CHANGELOG.md
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Ensure cliff config
        shell: bash
        run: |
          if [ ! -f cliff.toml ]; then
            cat > cliff.toml <<'TOML'
          [changelog]
          header = "# Changelog\n\nAll notable changes to ΣLANG / SigmaLang.\nFormat follows [Keep a Changelog](https://keepachangelog.com/en/1.1.0/).\n\n"
          body = """
          {% if version %}## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}{% else %}## [Unreleased]{% endif %}
          {% for group, commits in commits | group_by(attribute="group") %}
          ### {{ group | upper_first }}
          {% for commit in commits %}- {{ commit.message | upper_first | trim }}{% if commit.id %} ({{ commit.id | truncate(length=7, end="") }}){% endif %}
          {% endfor %}{% endfor %}\n
          """
          trim = true

          [git]
          conventional_commits = true
          filter_unconventional = false
          commit_parsers = [
            { message = "^feat",     group = "Features" },
            { message = "^fix",      group = "Bug Fixes" },
            { message = "^perf",     group = "Performance" },
            { message = "^refactor", group = "Refactoring" },
            { message = "^docs",     group = "Documentation" },
            { message = "^test",     group = "Tests" },
            { message = "^chore",    group = "Chores" },
            { message = "^ci",       group = "CI/CD" },
            { message = "^build",    group = "Build" },
            { message = "^security", group = "Security" },
          ]
          tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
          sort_commits = "newest"
          TOML
          fi

      - name: Generate CHANGELOG.md
        shell: bash
        run: |
          git-cliff --output CHANGELOG.md
          echo "----- preview -----"
          head -40 CHANGELOG.md

      - name: Commit & push if changed
        shell: bash
        run: |
          if git diff --quiet CHANGELOG.md cliff.toml 2>/dev/null; then
            echo "No changelog changes"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md cliff.toml
          git commit -m "docs(changelog): regenerate for ${GITHUB_REF_NAME:-${{ inputs.tag }}} [skip ci]"
          git push origin HEAD:main || git push
