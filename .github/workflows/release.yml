name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest pytest-asyncio pytest-timeout httpx
          pip install -e .

      - name: Run tests
        run: |
          python -m pytest tests/ --ignore=tests/claude_integration -v --timeout=300

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate changelog from commits
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1 || echo "")
          if [ -z "$PREV_TAG" ]; then
            # No previous tag — include all commits
            CHANGES=$(git log --oneline --no-decorate HEAD | head -50)
          else
            CHANGES=$(git log --oneline --no-decorate "${PREV_TAG}..HEAD" | head -50)
          fi
          # Write to file for multi-line output
          echo "$CHANGES" > /tmp/changelog.txt
          echo "Generated changelog with $(echo "$CHANGES" | wc -l) entries"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: ΣLANG v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## ΣLANG v${{ steps.get_version.outputs.VERSION }}

            Sub-Linear Algorithmic Neural Glyph Language for LLM compression.

            ### Installation
            ```bash
            pip install sigmalang==${{ steps.get_version.outputs.VERSION }}
            # or from source:
            pip install git+https://github.com/${{ github.repository }}.git@v${{ steps.get_version.outputs.VERSION }}
            ```

            ### What's Changed
            ```
            ${{ steps.changelog.outputs.changes || 'See CHANGELOG.md for details.' }}
            ```

            ### Full Changelog
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for complete history.
          files: |
            dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ════════════════════════════════════════════════════════════════════════
  # Publish to PyPI (requires PYPI_API_TOKEN secret)
  # To enable: add PYPI_API_TOKEN to repo Settings > Secrets > Actions
  # ════════════════════════════════════════════════════════════════════════
  publish-pypi:
    needs: release
    runs-on: ubuntu-latest
    environment: pypi # requires approval in GitHub environment settings
    permissions:
      id-token: write # for trusted publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  # ════════════════════════════════════════════════════════════════════════
  # Publish Docker Image on release
  # ════════════════════════════════════════════════════════════════════════
  publish-docker:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3.3.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract version
        id: meta
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.VERSION }}
            ghcr.io/${{ github.repository }}:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/sigmalang:${{ steps.meta.outputs.VERSION }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/sigmalang:latest
