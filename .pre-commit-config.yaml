# =============================================================================
# ΣLANG Pre-commit Configuration — Autonomy & Automation v7
# Runs quality gates BEFORE code reaches the repository
# =============================================================================
# Install: pip install pre-commit && pre-commit install
# Run all: pre-commit run --all-files
# Update:  pre-commit autoupdate
# =============================================================================

repos:
  # ── Secrets Detection ────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.1
    hooks:
      - id: gitleaks
        name: gitleaks - detect secrets
        entry: gitleaks detect --source git --verbose
        language: golang
        stages: [pre-commit]

  # ── Code Formatting ──────────────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: "24.10.0"
    hooks:
      - id: black
        language_version: python3
        args: [--line-length=120]

  - repo: https://github.com/pycqa/isort
    rev: "5.13.2"
    hooks:
      - id: isort
        args: [--profile=black, --line-length=120]

  # ── Linting (Ruff replaces flake8 — faster, more comprehensive) ─────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.8.6"
    hooks:
      - id: ruff
        args: [--fix, --ignore=E501,F401]

  # ── Type Checking ────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.1
    hooks:
      - id: mypy
        name: mypy - Python type checker
        additional_dependencies: ['types-all']
        args: ['--ignore-missing-imports']

  # ── Security ─────────────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: "1.8.3"
    hooks:
      - id: bandit
        args: [-r, sigmalang/, -ll]
        additional_dependencies: ["bandit[toml]"]

  # ── File Hygiene ─────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v5.0.0"
    hooks:
      - id: check-yaml
        args: ['--unsafe']
      - id: check-json
      - id: check-toml
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: debug-statements
      - id: detect-private-key

  # ── Fast Test Gate (critical path tests — blocks bad commits) ────────
  - repo: local
    hooks:
      - id: fast-test-gate
        name: fast-test-gate (core + config)
        entry: python -m pytest tests/test_sigmalang.py tests/test_config.py -q --tb=line --no-header --timeout=30
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      - id: check-case-conflict
      - id: detect-private-key
        name: Detect private keys

  # Secrets detection via python
  - repo: local
    hooks:
      - id: check-secrets-python
        name: Check for secrets in Python files
        entry: python -c "
import sys
import re
patterns = [
    r'password\s*=\s*[\"\\'](?!changeme)',
    r'secret\s*=\s*[\"\\'](?!change)',
    r'api[_-]?key\s*=\s*[\"\\'](?!sk-)',
    r'token\s*=\s*[\"\\'](?!hf_)',
]
for file in sys.argv[1:]:
    with open(file) as f:
        for i, line in enumerate(f, 1):
            if any(re.search(p, line, re.I) for p in patterns):
                print(f'{file}:{i}: Potential secret found')
sys.exit(0)
        "
        language: system
        types: [python]
        pass_filenames: true

# Disable by default for faster commits
# Enable with: pre-commit run --all-files
default_stages: [commit]
